name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop
        run: pnpm --filter @timetracker/desktop build

      - name: Pack desktop artifact
        run: tar -czf timetracker-desktop-${{ github.ref_name }}.tar.gz -C apps/desktop dist

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: timetracker-desktop-${{ github.ref_name }}.tar.gz
